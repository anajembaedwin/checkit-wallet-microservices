syntax = "proto3";

package wallet;

service WalletService {
  rpc CreateWallet (CreateWalletRequest) returns (WalletResponse);
  rpc GetWallet (GetWalletRequest) returns (WalletResponse);
  rpc CreditWallet (UpdateBalanceRequest) returns (WalletResponse);
  rpc DebitWallet (UpdateBalanceRequest) returns (WalletResponse);
}

message CreateWalletRequest {
  string userId = 1;
}

message GetWalletRequest {
  string userId = 1;
}

message UpdateBalanceRequest {
  string userId = 1;
  int32 amount = 2;
}

message WalletResponse {
  string id = 1;
  string userId = 2;
  int32 balance = 3;
  string createdAt = 4;
}